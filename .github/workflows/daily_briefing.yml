name: Daily Market Briefing

on:
  schedule:
    # 한국시간(KST) 16:00 = UTC 10:00 (매일 장마감 후 오후 4시)
    # 평일(월~금)만 실행
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {}  # 수동 실행 버튼 (Actions 탭에서 즉시 실행 가능)

permissions:
  contents: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 일시정지 상태 확인
        id: pause_check
        run: |
          cd src
          python check_pause.py

      - name: 시세 수집 + 분석 + 텔레그램 발송
        if: steps.pause_check.outputs.paused != 'true'
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd src
          python main.py

      - name: 변경사항 커밋 및 푸시 (충돌 방지 재시도)
        if: steps.pause_check.outputs.paused != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "변경사항 없음, 커밋 생략"
            exit 0
          fi
          git commit -m "📊 자동 브리핑 업데이트 $(date +'%Y-%m-%d %H:%M')"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "푸시 충돌, ${i}번째 재시도 (3초 대기)..."
            sleep 3
          done
